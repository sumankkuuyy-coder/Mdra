<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical System Halt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=JetBrains+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Animated Particles/Glowing BG */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0505 0%, #000 100%);
            z-index: 1;
        }

        .red-dot {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 0, 0, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            animation: move 8s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* The Premium Popup */
        .glass-modal {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 35px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 0, 0, 0.05);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Glowing Icon Shield */
        .icon-circle {
            width: 90px;
            height: 90px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #2b0000 0%, #ff0000 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            position: relative;
        }

        .icon-circle i {
            font-size: 40px;
            color: #fff;
            animation: pulse-icon 2s infinite;
        }

        @keyframes pulse-icon {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Typography */
        h1 {
            color: #fff;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .status-pill {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.5);
            color: #ff3e3e;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        b {
            color: #fff;
            font-weight: 600;
        }

        /* Recharge Info Box */
        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px dashed rgba(255, 0, 0, 0.2);
        }

        .info-box span {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #ff3e3e;
            margin-top: 5px;
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        /* Continuous Border Animation */
        .glass-modal::after {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(90deg, transparent, rgba(255,0,0,0.4), transparent);
            border-radius: 35px;
            z-index: -1;
            animation: rotateLine 3s linear infinite;
        }

        @keyframes rotateLine {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="red-dot"></div>
    </div>

    <div class="glass-modal">
        <div class="status-pill">System Restricted</div>
        
        <div class="icon-circle">
            <i class="fas fa-microchip"></i>
        </div>

        <h1>ACCESS EXPIRED</h1>
        
        <p>
            Your website's <b>Free Subscription</b> has reached its end of life. All core functions are currently <b>suspended</b> by the developer.
        </p>

        <div class="info-box">
            <span style="color: #fff; font-weight: bold; font-size: 15px;">REQUIRED ACTION:</span>
            <span>RECHARGE YOUR ACCOUNT FOR FULL RESTORATION</span>
        </div>

        <div class="footer">
            HOST_STAMP: BK-8789-V1
        </div>
    </div>

</body>
</html>
